{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="{% static 'Styles/login.css' %}"> 
</head>
<form method="post" class="login-form">
    {% csrf_token %}

    {% if form.errors %}
        <div style="color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 20px;">
            {{ form.errors }}
        </div>
    {% endif %}

    <label for="id_new_password1" class="form-label">Contraseña</label>
    <input type="password" name="new_password1" id="id_new_password1" class="form-input" required>

    <label for="id_new_password2" class="form-label">Confirme su Contraseña</label>
    <input type="password" name="new_password2" id="id_new_password2" class="form-input" required>

    <button type="submit" class="login-button">Actualizar Contraseña</button>
</form>
